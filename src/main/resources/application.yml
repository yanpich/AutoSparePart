spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/autosparepartdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Fixed: Use MySQLDialect instead of MySQL8Dialect
        dialect: org.hibernate.dialect.MySQLDialect
    database: MYSQL

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB
      file-size-threshold: 2KB

file:
  upload-dir: uploads/
  allowed:
    images: jpg,jpeg,png,gif,webp
  max-size: 5MB

app:
  base-url: http://localhost:8080
  pagination:
    default-size: 10
    max-size: 100
  images:
    placeholder: /images/placeholder.jpg
    product-path: uploads/products/
    brand-path: uploads/brands/
    category-path: uploads/categories/

logging:
  level:
    com.real.autosparepart: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  file:
    name: ./logs/autospare.log
    max-size: 10MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"