spring:
  profiles:
    active: dev
  application:
    name: AutoSparePart

  output:
    ansi:
      enabled: always

# Default logging configuration
logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([%thread]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"