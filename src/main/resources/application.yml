spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/autosparepartdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    database: MYSQL

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB      # Increased for multiple images
      max-request-size: 50MB   # Increased for multiple images
      file-size-threshold: 2KB
      resolve-lazily: false    # Added for better multipart handling

# File upload configuration
file:
  upload-dir: uploads/
  allowed:
    images: jpg,jpeg,png,gif,webp,bmp,svg
  max-size: 10MB

app:
  base-url: http://localhost:8080/
  pagination:
    default-size: 10
    max-size: 100
  images:
    placeholder: /images/placeholder.jpg
    # Use absolute paths to avoid confusion
    base-dir: uploads/
    product-path: uploads/products/
    brand-path: uploads/brands/
    category-path: uploads/categories/
    # Absolute paths for production (uncomment when needed)
    # product-path-absolute: ${user.dir}/uploads/products/
    # brand-admin-panel-path-absolute: ${user.dir}/uploads/brands/

logging:
  level:
    com.real.autosparepart: INFO    # Change from DEBUG to INFO
    org.springframework.web: WARN   # Change from DEBUG to WARN
    org.hibernate: WARN
    org.springframework.web.multipart: WARN  # Reduce multipart logging
  file:
    name: ./logs/autospare.log
    max-size: 10MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"